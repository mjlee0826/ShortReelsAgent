# ShortReels 評測 dataset 範例 spec（可直接試跑）
#
# 說明：
# - theme 為中文，用於 prompt 生成（與 eval/prompts/lexicon.py 的主題鍵一致才會套用專屬詞庫；
#   未收錄的主題會自動用通用詞庫，仍切合主題）。
# - keywords 為 API 搜尋關鍵字，建議用英文（Pexels/Pixabay 以英文檢索效果較佳）；本範例刻意用
#   「具體」關鍵字（壽司、東京鐵塔、拉花…）而非泛詞，讓候選素材池更多樣、更能考驗剪輯能力。
# - scope：focused=單一主體（如某杯飲料）、broad=多場景（如一日遊）；會寫進 manifest 並影響 prompt。
# - target_total_seconds 為該組「秒數預算」：影片＋圖片一起算（圖片以名目秒數計）。抓取會湊到
#   預算 × candidate_multiplier 的候選池；策展（人工或自動 fallback）挑到覆蓋預算為止。
# - image_ratio：該組圖片佔秒數預算的比例（選填，覆寫 default_image_ratio）。
#
# 三軸難度（evaluation 切片用，皆寫進 manifest / prompts）：
# - topic_difficulty：主題敘事難度（broad 多場景通常較難）。easy / medium / hard。
# - asset_difficulty：素材雜亂與多樣程度（關鍵字越廣、跨地、影圖越雜越難）。easy / medium / hard。
# - prompt 難度：不在此設定，由生成階段依 prompt 詳細度自動推導成 U 型（minimal/detailed=hard、
#   light=easy、specific=medium），落在每筆 prompt 的 difficulty 欄。
# 本範例刻意讓 topic 與 asset 兩軸都涵蓋 easy/medium/hard，方便比較不同產品在各難度下的表現。
# 註：broad 旅遊類主題（如「日本旅遊」）刻意放寬地理範圍，可混入跨地（北海道/京都/富士山）標誌性素材。

dataset_version: v1
output_dir: eval/_build

# 啟用的來源平台（需設定 PEXELS_API_KEY / PIXABAY_API_KEY；影片與圖片都會抓）
# 抓取時兩家平台「公平分配＋補滿」輪流取用：每個池先讓各來源各湊約 1/N，再用全部來源補到預算，
# 因此影片與圖片都會混入 Pixabay（不會被先查到的 Pexels 一次塞滿）。
sources:
  - pexels
  - pixabay

# 各組未指定時的預設值
default_target_total_seconds: 90    # 秒數預算（秒）
default_image_ratio: 0.3            # 圖片佔秒數預算的比例（其餘為影片）
image_nominal_seconds: 3.0          # 一張圖片計入秒數預算的名目秒數
candidate_multiplier: 2.5           # 候選池目標 = 秒數預算 × 此倍數（多抓留給策展）

groups:
  # ───── broad：多場景，考驗把雜亂素材組織成敘事（topic/asset 偏難）─────
  # 日本旅遊：放寬到跨地（東京/京都/大阪/北海道/富士山）的具體地標與食物，素材最雜、最難
  - group_id: japan_trip
    theme: 日本旅遊
    scope: broad
    topic_difficulty: hard
    asset_difficulty: hard
    keywords: [sushi, ramen bowl, tokyo tower, senso-ji temple, torii gate, shibuya crossing, mount fuji, kyoto old street, hokkaido snow, shinkansen train, cherry blossom, osaka night]
    target_total_seconds: 150
    prompt_count: 8

  - group_id: night_city_walk
    theme: 城市夜散步
    scope: broad
    topic_difficulty: hard
    asset_difficulty: hard
    keywords: [neon street signs, traffic light trails, night market food stall, crosswalk at night, skyscraper night, rainy street reflection, izakaya alley, subway station night, rooftop city view, street food grilling]
    target_total_seconds: 90
    prompt_count: 8

  - group_id: beach_day
    theme: 海邊一日遊
    scope: broad
    topic_difficulty: medium
    asset_difficulty: medium
    keywords: [ocean waves, sunset beach, surfing wave, palm trees beach, beach umbrella, snorkeling coral reef, footprints in sand, seaside cliff, beach volleyball, coconut drink beach]
    target_total_seconds: 90
    prompt_count: 8

  - group_id: mountain_hike
    theme: 健行登山
    scope: broad
    topic_difficulty: medium
    asset_difficulty: medium
    keywords: [mountain hiking trail, summit sunrise, sea of clouds, forest path, alpine lake, rocky ridge, hiking boots closeup, trekking backpack, forest waterfall, mountain wildflowers]
    target_total_seconds: 120
    prompt_count: 8

  - group_id: gym_workout
    theme: 健身房日常
    scope: broad
    topic_difficulty: medium
    asset_difficulty: medium
    keywords: [deadlift barbell, squat rack, treadmill running, dumbbell curl, battle ropes, kettlebell swing, sweat closeup, rowing machine, stretching, pull up bar]
    target_total_seconds: 90
    prompt_count: 8

  # 居家料理：步驟雖多但場景一致（廚房），素材相對單純 → asset 偏易
  - group_id: home_cooking
    theme: 居家料理
    scope: broad
    topic_difficulty: medium
    asset_difficulty: easy
    keywords: [chopping vegetables, stir fry wok flame, boiling pasta, plating dish, sizzling steak pan, kneading dough, pouring sauce, fresh ingredients, garnishing herbs, knife slicing closeup]
    target_total_seconds: 90
    prompt_count: 8

  # ───── focused：單一主體，考驗從相似鏡頭做出節奏與變化（topic 偏易）─────
  # 烘焙甜點 / 水族箱：成品種類多、視覺較雜 → asset 升到 medium
  - group_id: baking_dessert
    theme: 烘焙甜點
    scope: focused
    topic_difficulty: easy
    asset_difficulty: medium
    keywords: [cake decorating, piping cream, oven baking, powdered sugar dusting, chocolate ganache, cutting layered cake, strawberry tart, cookie dough, macarons closeup]
    target_total_seconds: 60
    image_ratio: 0.4          # 甜點成品照很適合，這組多放一點圖片
    prompt_count: 8

  - group_id: aquarium_fish
    theme: 水族箱
    scope: focused
    topic_difficulty: easy
    asset_difficulty: medium
    keywords: [tropical fish swimming, aquarium plants, rising bubbles, fish feeding, clownfish closeup, light through water, coral reef tank, school of fish, snail on glass]
    target_total_seconds: 60
    prompt_count: 8

  # 特調飲料 / 拉花 / 貓咪 / 多肉：單一主體、視覺一致 → topic 與 asset 皆易
  - group_id: signature_drink
    theme: 特調飲料
    scope: focused
    topic_difficulty: easy
    asset_difficulty: easy
    keywords: [iced coffee pouring, cocktail closeup, bubble tea, fruit soda splash, matcha latte, ice cubes drop, citrus garnish, smoothie pour, glass condensation, straw stir]
    target_total_seconds: 60
    image_ratio: 0.4          # 單品照片很適合，這組多放一點圖片
    prompt_count: 8

  - group_id: latte_art
    theme: 拉花咖啡
    scope: focused
    topic_difficulty: easy
    asset_difficulty: easy
    keywords: [latte art pour, espresso extraction, milk foam rosetta, coffee crema closeup, barista tamping, steaming milk pitcher, latte top down, coffee bean grinder]
    target_total_seconds: 45
    prompt_count: 8

  - group_id: cat_daily
    theme: 貓咪日常
    scope: focused
    topic_difficulty: easy
    asset_difficulty: easy
    keywords: [cat closeup, kitten playing, cat yawning, cat paws, cat stretching, cat tail flick, cat grooming, cat staring camera, cat sleeping curled]
    target_total_seconds: 60
    prompt_count: 8

  - group_id: potted_plant
    theme: 多肉植物
    scope: focused
    topic_difficulty: easy
    asset_difficulty: easy
    keywords: [succulent closeup, potted plants row, watering droplets leaf, repotting hands, cactus spines macro, plant on windowsill, terracotta pots, leaf texture macro, plant cuttings]
    target_total_seconds: 45
    image_ratio: 0.4          # 多肉單品照素材豐富
    prompt_count: 8
